<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos GPON - Matrix</title>
    <style>
        /* ----- RESET Y ESTILOS GENERALES ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: black;
            color: #333;
            min-height: 100vh;
            position: relative;
        }

        /* Canvas de Matrix: fondo */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            background: black;
        }

        /* ---- MASCOTA (esquina superior derecha, sin bordes) ---- */
        .mascota {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 150px;
            height: auto;
            /* Elimina cualquier posible borde */
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            /* Para que no tenga fondo ni padding */
            background: transparent !important;
            /* Permitir que el puntero pase a través si se quiere */
            pointer-events: none;
        }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            .mascota {
                max-width: 100px;
                top: 10px;
                right: 10px;
            }
        }

        /* Contenedor principal: se superpone al canvas */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 20px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.15);
            border: 1px solid rgba(0, 255, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #0f0;
            margin-bottom: 10px;
            font-size: 2.4rem;
            text-shadow: 0 0 20px #0f0, 0 0 40px #0f0;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1.1rem;
            text-shadow: 0 0 10px #0f0;
        }

        /* Tarjeta de comando (estilo oscuro) */
        .command-card {
            background: rgba(20, 20, 20, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 255, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #0f0;
            transition: 0.3s;
        }

        .command-card:hover {
            box-shadow: 0 6px 30px rgba(0, 255, 0, 0.2);
            border-left-color: #ff0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .card-header .category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0, 255, 0, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            color: #0f0;
            font-weight: 600;
            border: 1px solid rgba(0, 255, 0, 0.3);
        }

        .card-header .description {
            font-weight: 600;
            font-size: 1.05rem;
            color: #0f0;
            flex: 1;
            margin: 0 10px;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .command-textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #2a5a2a;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            background: #0a0f0a;
            resize: vertical;
            min-height: 60px;
            transition: 0.2s;
            color: #bfd9bf;
            line-height: 1.6;
        }

        .command-textarea:focus {
            outline: none;
            border-color: #0f0;
            box-shadow: 0 0 0 3px rgba(0, 255, 0, 0.3);
            background: #111;
            color: #fff;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-copy {
            background: #0f0;
            color: #000;
        }
        .btn-copy:hover {
            background: #8f8;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 255, 0, 0.4);
        }

        .btn-reset {
            background: #444;
            color: #ccc;
        }
        .btn-reset:hover {
            background: #666;
            color: #fff;
        }

        .btn-copy-all {
            background: #0f0;
            color: #000;
            padding: 12px 30px;
            margin-bottom: 25px;
            border-radius: 50px;
            font-size: 1rem;
            width: 100%;
            justify-content: center;
            font-weight: 700;
        }
        .btn-copy-all:hover {
            background: #8f8;
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        /* Footer con el nombre en rojo negrita */
        .footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 30px 20px 20px;
            margin-top: 30px;
            color: #ff0000;
            font-weight: 900;
            font-size: 2.2rem;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #ff0000;
            letter-spacing: 4px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f0;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(0, 255, 0, 0.4);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            .card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .card-header .description {
                margin: 0;
                font-size: 0.95rem;
            }
            .command-textarea {
                font-size: 0.85rem;
                min-height: 80px;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .footer {
                font-size: 1.5rem;
                padding: 20px 10px;
            }
        }

        @media (max-width: 400px) {
            .button-group {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- CANVAS DE MATRIX (fondo) -->
    <canvas id="matrix-canvas"></canvas>

    <!-- MASCOTA (esquina superior derecha, SIN BORDES) -->
    <img 
        src="https://i.postimg.cc/LX7JH4MJ/5dd1c327455411eeb92db29646062438-removebg-preview.png" 
        alt="Mascota" 
        class="mascota"
        loading="lazy"
    >

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container">
        <h1>📡 Comandos GPON</h1>
        <p class="subtitle">✦ Edita, copia y ejecuta tus comandos en la Matrix ✦</p>

        <button class="btn btn-copy-all" onclick="copiarTodos()">
            📋 Copiar TODOS los comandos (uno debajo de otro)
        </button>

        <div id="commands-container"></div>
    </div>

    <!-- FOOTER con el nombre en rojo negrita -->
    <div class="footer">
        DAVID JESUS ZEGARRA
    </div>

    <!-- TOAST de notificación -->
    <div id="toast" class="toast">✅ ¡Copiado!</div>

    <script>
        // ------------------------------------------------------------
        // 1. ANIMACIÓN MATRIX (canvas)
        // ------------------------------------------------------------
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let columns, drops;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            columns = Math.floor(width / 20);
            drops = Array(columns).fill(1);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%&*()_+{}[]|;:,.<>?/";

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#0f0';
            ctx.font = '20px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                const x = i * 20;
                const y = drops[i] * 20;

                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#fff';
                } else {
                    ctx.fillStyle = '#0f0';
                }

                ctx.fillText(char, x, y);

                if (y > height && Math.random() > 0.975) {
                    drops[i] = 1;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        // ------------------------------------------------------------
        // 2. BASE DE DATOS DE COMANDOS
        // ------------------------------------------------------------
        const comandosData = [
            {
                categoria: 'Acceso',
                descripcion: 'Telnet al equipo',
                comando: 'system telnet 136.1.1.100'
            },
            {
                categoria: 'Acceso',
                descripcion: 'Contraseña (escribe al hacer telnet)',
                comando: 'fibratel@2023CHAO'
            },
            {
                categoria: 'Detección',
                descripcion: 'DETECTAR EQUIPO - ONUs no configuradas',
                comando: 'show gpon onu uncfg'
            },
            {
                categoria: 'Detección',
                descripcion: 'VER PUERTOS DISPONIBLES',
                comando: 'show running-config interface gpon-olt_1/2/13'
            },
            {
                categoria: 'Borrado',
                descripcion: 'BORRAR ONU (ejemplo puerto 12, ONU 25)',
                comando: `confi ter
        interface gpon-olt_1/2/12
        no onu 25
        exit`
            },
            {
                categoria: 'Detección',
                descripcion: 'VER PUERTO CON SERIE (cambia la serie)',
                comando: 'show gpon onu by sn OPTI36A0A22D'
            },
            {
                categoria: 'Reinicio',
                descripcion: 'REINICIAR ONU (ejemplo 1/2/9:3)',
                comando: `confi ter
        pon-onu-mng gpon-onu_1/2/9:3
        reboot
        exit
        exit`
            },
            {
                categoria: 'Detección',
                descripcion: 'VER LA DESCRIPCIÓN DE LA ONU',
                comando: 'sho run int gpon-onu_1/2/5:1'
            },
            {
                categoria: 'Detección',
                descripcion: 'VER POTENCIA DE LA ONU',
                comando: 'sho pon power attenuation gpon-onu_1/2/4:16'
            },
            {
                categoria: 'Detección',
                descripcion: 'MOSTRAR MÁS DETALLES EN LA ONU',
                comando: 'sho gpon onu detail-info gpon-onu_1/2/1:6'
            },
            {
                categoria: 'Detección',
                descripcion: 'DETALLA EL ESTADO DE TODAS LAS ONUS (LOS, WORKING, FUERA DE LÍNEA)',
                comando: 'Show gpon onu state'
            },
            {
                categoria: 'Detección',
                descripcion: 'VISUALIZA EL ESTADO DEL EQUIPO CON POTENCIA (varios ejemplos)',
                comando: `show pon power onu-rx gpon-olt_1/2/9
        show pon power onu-rx gpon-olt_1/5/16
        show gpon onu state gpon-olt_1/2/12`
            },
            {
                categoria: 'CATV',
                descripcion: 'ACTIVAR CATV (ejemplo 1/2/13:17)',
                comando: `confi ter
        pon-onu-mng gpon-onu_1/2/13:17
        interface video video_0/1 state unlock
        exit
        exit
        wr`
            },
            {
                categoria: 'CATV',
                descripcion: 'SUSPENDER CATV (ejemplo 1/2/3:10)',
                comando: `confi ter
        pon-onu-mng gpon-onu_1/2/3:10
        interface video video_0/1 state lock
        exit
        exit
        wr`
            },
            {
                categoria: 'Detección',
                descripcion: 'VISUALIZAR LAS SERIES DE UN PUERTO',
                comando: 'show gpon baseinfo gpon-olt_1/12/2'
            },
            {
                categoria: 'Configuración ONU',
                descripcion: 'Crear ONU y configurar servicios (puerto 4, ONU 16)',
                comando: `confi ter
        interface gpon-olt_1/2/4
        onu 16 type ZTE-F625 sn OPTI36A1C185
        exit
        interface gpon-onu_1/2/4:16
        Name OPTI36A1C185
        description MARVERDEXXX
        tcont 1 profile FTTH
        gemport 1 tcont 1
        switchport mode hybrid vport 1
        service-port 1 vport 1 user-vlan 100 vlan 100
        exit
        pon-onu-mng gpon-onu_1/2/4:16
        interface video video_0/1 state unlock
        service hsi gemport 1 vlan 100
        exit
        exit
        wr`
            }
        ];

        // ------------------------------------------------------------
        // 3. RENDERIZAR COMANDOS
        // ------------------------------------------------------------
        const container = document.getElementById('commands-container');

        function renderCommands() {
            container.innerHTML = '';
            comandosData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'command-card';

                const header = document.createElement('div');
                header.className = 'card-header';
                header.innerHTML = `
                    <span class="category">${item.categoria}</span>
                    <span class="description">${item.descripcion}</span>
                `;

                const body = document.createElement('div');
                body.className = 'card-body';

                const textarea = document.createElement('textarea');
                textarea.className = 'command-textarea';
                textarea.value = item.comando;
                textarea.id = `cmd-${index}`;
                textarea.spellcheck = false;

                const btnGroup = document.createElement('div');
                btnGroup.className = 'button-group';

                const btnCopy = document.createElement('button');
                btnCopy.className = 'btn btn-copy';
                btnCopy.innerHTML = '📋 Copiar';
                btnCopy.addEventListener('click', () => copiarComando(index));

                const btnReset = document.createElement('button');
                btnReset.className = 'btn btn-reset';
                btnReset.innerHTML = '↩️ Restablecer';
                btnReset.addEventListener('click', () => resetearComando(index));

                btnGroup.appendChild(btnCopy);
                btnGroup.appendChild(btnReset);

                body.appendChild(textarea);
                body.appendChild(btnGroup);
                card.appendChild(header);
                card.appendChild(body);
                container.appendChild(card);
            });
        }

        // ------------------------------------------------------------
        // 4. FUNCIONES DE COPIADO / RESET
        // ------------------------------------------------------------
        function copiarComando(index) {
            const textarea = document.getElementById(`cmd-${index}`);
            if (!textarea) return;
            const texto = textarea.value;
            navigator.clipboard.writeText(texto).then(() => {
                mostrarToast('✅ ¡Comando copiado!');
            }).catch(() => {
                textarea.select();
                document.execCommand('copy');
                mostrarToast('✅ ¡Comando copiado!');
            });
        }

        function resetearComando(index) {
            const textarea = document.getElementById(`cmd-${index}`);
            if (!textarea) return;
            textarea.value = comandosData[index].comando;
            mostrarToast('↩️ Comando restablecido');
        }

        function copiarTodos() {
            let todos = '';
            comandosData.forEach(item => {
                todos += item.comando + '\n\n';
            });
            navigator.clipboard.writeText(todos).then(() => {
                mostrarToast('📋 ¡Todos los comandos copiados!');
            }).catch(() => {
                const temp = document.createElement('textarea');
                temp.value = todos;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                mostrarToast('📋 ¡Todos los comandos copiados!');
            });
        }

        // ------------------------------------------------------------
        // 5. TOAST
        // ------------------------------------------------------------
        let toastTimeout;

        function mostrarToast(mensaje) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ------------------------------------------------------------
        // 6. INICIAR
        // ------------------------------------------------------------
        renderCommands();
    </script>
</body>
</html>
